image: maven:3.9-eclipse-temurin-25

stages:
  - build
  - test

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --errors --show-version"

cache:
  key: maven-${CI_COMMIT_REF_SLUG}
  paths:
    - .m2/repository/

# Client compilation passes
build-client:
  stage: build
  script:
    - mvn $MAVEN_CLI_OPTS clean compile

# Server compilation passes
build-server:
  stage: build
  script:
    - cd server && mvn $MAVEN_CLI_OPTS clean compile

# Client tests pass
test-client:
  stage: test
  script:
    - mvn $MAVEN_CLI_OPTS test

# Server tests pass
test-server:
  stage: test
  script:
    - cd server && mvn $MAVEN_CLI_OPTS test
